# Server
server.port=8080

# Local MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/college_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - Create tables on local
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# Thymeleaf - No cache for development
spring.thymeleaf.cache=false

# Logging
logging.level.com.college=DEBUG