# Server - Render will provide PORT
server.port=${PORT:8080}

# Production MySQL (Aiven or Clever Cloud)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari Connection Pool for Production
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.poolName=CollegeHikariPool

# JPA - Update schema (don't drop)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# SSL for Aiven MySQL (CRITICAL!)
spring.datasource.hikari.dataSourceProperties.useSSL=true
spring.datasource.hikari.dataSourceProperties.requireSSL=true
spring.datasource.hikari.dataSourceProperties.verifyServerCertificate=false
spring.datasource.hikari.dataSourceProperties.serverTimezone=UTC

# Thymeleaf - Enable cache for production
spring.thymeleaf.cache=true

# Logging - Less verbose in production
logging.level.com.college=WARN
logging.level.org.springframework.web=ERROR