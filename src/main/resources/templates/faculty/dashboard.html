<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Faculty Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand"><i class="fas fa-chalkboard-teacher"></i> Faculty Portal</span>
            <div><span class="text-white me-3">Welcome, <span th:text="${faculty.name}"></span></span>
            <a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a></div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a th:href="@{/faculty/dashboard}" class="list-group-item active">Dashboard</a>
                    <a th:href="@{/faculty/attendance}" class="list-group-item">Mark Attendance</a>
                    <a th:href="@{/faculty/marks}" class="list-group-item">Add Marks</a>
                    <a th:href="@{/faculty/courses}" class="list-group-item">My Courses</a>
                </div>
            </div>
            <div class="col-md-9">
                <div class="row">
                    <div class="col-md-6 mb-3"><div class="card bg-primary text-white"><div class="card-body"><h5>Courses</h5><h2 th:text="${courses.size()}">0</h2></div></div></div>
                    <div class="col-md-6 mb-3"><div class="card bg-success text-white"><div class="card-body"><h5>Students</h5><h2>150</h2></div></div></div>
                </div>
                <div class="card"><div class="card-header"><h5>My Courses</h5></div><div class="card-body"><ul class="list-group"><li th:each="c : ${courses}" class="list-group-item" th:text="${c.courseCode + ' - ' + c.courseName}"></li></ul></div></div>
            </div>
        </div>
    </div>
</body>
</html>
