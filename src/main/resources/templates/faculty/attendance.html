<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Mark Attendance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-primary"><div class="container"><span class="navbar-brand">Mark Attendance</span>
<a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a></div></nav>
<div class="container mt-4"><div class="card"><div class="card-header bg-success text-white"><h4>Mark Student Attendance</h4></div>
<div class="card-body"><form action="#" th:action="@{/faculty/attendance/mark}" method="post">
<div class="mb-3"><label>Course</label><select name="courseId" class="form-control" required>
<option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.courseCode + ' - ' + c.courseName}"></option></select></div>
<div class="mb-3"><label>Student</label><select name="studentId" class="form-control" required>
<option th:each="s : ${students}" th:value="${s.id}" th:text="${s.studentId + ' - ' + s.name}"></option></select></div>
<div class="mb-3"><label>Status</label><select name="status" class="form-control" required>
<option value="PRESENT">Present</option><option value="ABSENT">Absent</option><option value="LATE">Late</option></select></div>
<button type="submit" class="btn btn-primary">Mark Attendance</button></form></div></div></div>
</body></html>
