<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Add Marks</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-primary"><div class="container"><span class="navbar-brand">Add Marks</span>
<a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a></div></nav>
<div class="container mt-4"><div class="card"><div class="card-header bg-info text-white"><h4>Add Student Marks</h4></div>
<div class="card-body"><form action="#" th:action="@{/faculty/marks/add}" method="post">
<div class="mb-3"><label>Course</label><select name="courseId" class="form-control" required>
<option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.courseCode + ' - ' + c.courseName}"></option></select></div>
<div class="mb-3"><label>Student</label><select name="studentId" class="form-control" required>
<option th:each="s : ${students}" th:value="${s.id}" th:text="${s.studentId + ' - ' + s.name}"></option></select></div>
<div class="mb-3"><label>Exam Type</label><select name="examType" class="form-control" required>
<option>MID_TERM</option><option>FINAL</option><option>ASSIGNMENT</option><option>QUIZ</option></select></div>
<div class="row"><div class="col-md-6"><label>Marks Obtained</label><input type="number" step="0.01" name="marksObtained" class="form-control" required></div>
<div class="col-md-6"><label>Total Marks</label><input type="number" step="0.01" name="totalMarks" class="form-control" required></div></div>
<button type="submit" class="btn btn-primary mt-3">Add Marks</button></form></div></div></div>
</body></html>
