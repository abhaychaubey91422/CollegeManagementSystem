<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>My Courses</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-primary"><div class="container"><span class="navbar-brand">My Courses</span>
<a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a></div></nav>
<div class="container mt-4"><div class="card"><div class="card-header bg-success text-white"><h4>Assigned Courses</h4></div>
<div class="card-body"><table class="table"><thead class="table-dark"><tr><th>Code</th><th>Course Name</th><th>Department</th><th>Credits</th></tr></thead>
<tbody><tr th:each="c : ${courses}"><td th:text="${c.courseCode}"></td><td th:text="${c.courseName}"></td><td th:text="${c.department}"></td><td th:text="${c.credits}"></td></tr></tbody></table></div></div></div>
</body></html>
