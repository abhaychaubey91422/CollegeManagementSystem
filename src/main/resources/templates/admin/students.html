<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Manage Students</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-danger"><div class="container"><span class="navbar-brand">Manage Students</span>
<a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a></div></nav>
<div class="container mt-4"><div class="row"><div class="col-md-5"><div class="card"><div class="card-header bg-primary text-white"><h5>Add New Student</h5></div>
<div class="card-body"><form action="#" th:action="@{/admin/student/add}" method="post">
<input type="text" name="studentId" class="form-control mb-2" placeholder="Student ID" required>
<input type="text" name="name" class="form-control mb-2" placeholder="Full Name" required>
<input type="email" name="email" class="form-control mb-2" placeholder="Email" required>
<input type="text" name="department" class="form-control mb-2" placeholder="Department" required>
<input type="text" name="semester" class="form-control mb-2" placeholder="Semester" required>
<input type="text" name="username" class="form-control mb-2" placeholder="Username" required>
<input type="password" name="password" class="form-control mb-2" placeholder="Password" required>
<button type="submit" class="btn btn-primary">Add Student</button></form></div></div></div>
<div class="col-md-7"><div class="card"><div class="card-header bg-success text-white"><h5>Student List</h5></div>
<div class="card-body"><table class="table"><thead class="table-dark"><tr><th>ID</th><th>Name</th><th>Department</th><th>Action</th></tr></thead>
<tbody><tr th:each="s : ${students}"><td th:text="${s.studentId}"></td><td th:text="${s.name}"></td><td th:text="${s.department}"></td><td><a th:href="@{/admin/student/delete/{id}(id=${s.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Delete?')">Delete</a></td></tr></tbody>}</table></div></div></div></div></div>
</body></html>
