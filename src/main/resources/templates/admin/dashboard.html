<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-danger"><div class="container"><span class="navbar-brand"><i class="fas fa-user-shield"></i> Admin Portal</span>
<a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a></div></nav>
<div class="container mt-4"><div class="row"><div class="col-md-4"><div class="card bg-primary text-white"><div class="card-body"><h5>Total Students</h5><h2 th:text="${totalStudents}">0</h2></div></div></div>
<div class="col-md-4"><div class="card bg-success text-white"><div class="card-body"><h5>Total Faculty</h5><h2 th:text="${totalFaculty}">0</h2></div></div></div>
<div class="col-md-4"><div class="card bg-warning text-white"><div class="card-body"><h5>Total Courses</h5><h2 th:text="${totalCourses}">0</h2></div></div></div></div>
<div class="row mt-4"><div class="col-md-4"><div class="list-group"><a th:href="@{/admin/students}" class="list-group-item list-group-item-action">Manage Students</a>
<a th:href="@{/admin/faculty}" class="list-group-item list-group-item-action">Manage Faculty</a>
<a th:href="@{/admin/courses}" class="list-group-item list-group-item-action">Manage Courses</a></div></div></div></div>
</body></html>
