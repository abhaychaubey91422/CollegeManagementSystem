<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Manage Courses</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-danger"><div class="container"><span class="navbar-brand">Manage Courses</span>
<a th:href="@{/logout}" class="btn btn-light btn-sm">Logout</a></div></nav>
<div class="container mt-4"><div class="row"><div class="col-md-5"><div class="card"><div class="card-header bg-primary text-white"><h5>Add New Course</h5></div>
<div class="card-body"><form action="#" th:action="@{/admin/course/add}" method="post">
<input type="text" name="courseCode" class="form-control mb-2" placeholder="Course Code" required>
<input type="text" name="courseName" class="form-control mb-2" placeholder="Course Name" required>
<input type="text" name="department" class="form-control mb-2" placeholder="Department" required>
<input type="text" name="semester" class="form-control mb-2" placeholder="Semester" required>
<input type="number" name="credits" class="form-control mb-2" placeholder="Credits" required>
<button type="submit" class="btn btn-primary">Add Course</button></form></div></div></div>
<div class="col-md-7"><div class="card"><div class="card-header bg-success text-white"><h5>Course List</h5></div>
<div class="card-body"><table class="table"><thead class="table-dark"><tr><th>Code</th><th>Name</th><th>Department</th><th>Action</th></tr></thead>
<tbody><tr th:each="c : ${courses}"><td th:text="${c.courseCode}"></td><td th:text="${c.courseName}"></td><td th:text="${c.department}"></td><td><a th:href="@{/admin/course/delete/{id}(id=${c.id})}" class="btn btn-danger btn-sm">Delete</a></td></tr></tbody>}</table></div></div></div></div></div>
</body></html>
