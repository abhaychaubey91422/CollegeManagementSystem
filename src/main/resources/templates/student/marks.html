<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Marks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 bg-dark min-vh-100">
                <div class="text-center text-white py-4">
                    <i class="fas fa-graduation-cap fa-3x"></i>
                    <h5 class="mt-2">Student Panel</h5>
                </div>
                <nav class="nav flex-column">
                    <a th:href="@{/student/dashboard}" class="nav-link text-white">Dashboard</a>
                    <a th:href="@{/student/attendance}" class="nav-link text-white">Attendance</a>
                    <a th:href="@{/student/marks}" class="nav-link bg-primary text-white">Marks</a>
                    <a th:href="@{/student/profile}" class="nav-link text-white">Profile</a>
                    <a th:href="@{/logout}" class="nav-link text-white">Logout</a>
                </nav>
            </div>
            
            <div class="col-md-9 col-lg-10 p-4">
                <h2><i class="fas fa-chart-line"></i> Marks & Grades</h2>
                <hr>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="table-dark">
                            <tr><th>Course</th><th>Exam Type</th><th>Marks</th><th>Total</th><th>%</th><th>Grade</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="mark : ${marksList}">
                                <td th:text="${mark.course.courseName}"></td>
                                <td th:text="${mark.examType}"></td>
                                <td th:text="${mark.marksObtained}"></td>
                                <td th:text="${mark.totalMarks}"></td>
                                <td th:text="${mark.percentage}"></td>
                                <td><span class="badge bg-success" th:text="${mark.grade}"></span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
