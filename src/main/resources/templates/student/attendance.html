<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 bg-dark min-vh-100">
                <div class="text-center text-white py-4">
                    <i class="fas fa-graduation-cap fa-3x"></i>
                    <h5 class="mt-2">Student Panel</h5>
                </div>
                <nav class="nav flex-column">
                    <a th:href="@{/student/dashboard}" class="nav-link text-white">Dashboard</a>
                    <a th:href="@{/student/attendance}" class="nav-link bg-primary text-white">Attendance</a>
                    <a th:href="@{/student/marks}" class="nav-link text-white">Marks</a>
                    <a th:href="@{/student/profile}" class="nav-link text-white">Profile</a>
                    <a th:href="@{/logout}" class="nav-link text-white">Logout</a>
                </nav>
            </div>
            
            <div class="col-md-9 col-lg-10 p-4">
                <h2><i class="fas fa-calendar-check"></i> Attendance Record</h2>
                <hr>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="table-dark">
                            <tr><th>Date</th><th>Course</th><th>Status</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="att : ${attendanceList}">
                                <td th:text="${att.date}"></td>
                                <td th:text="${att.course.courseName}"></td>
                                <td>
                                    <span th:if="${att.status == 'PRESENT'}" class="badge bg-success">Present</span>
                                    <span th:if="${att.status == 'ABSENT'}" class="badge bg-danger">Absent</span>
                                    <span th:if="${att.status == 'LATE'}" class="badge bg-warning">Late</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
