<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 bg-dark min-vh-100">
                <div class="text-center text-white py-4">
                    <i class="fas fa-graduation-cap fa-3x"></i>
                    <h5 class="mt-2">Student Panel</h5>
                </div>
                <nav class="nav flex-column">
                    <a th:href="@{/student/dashboard}" class="nav-link text-white">Dashboard</a>
                    <a th:href="@{/student/attendance}" class="nav-link text-white">Attendance</a>
                    <a th:href="@{/student/marks}" class="nav-link text-white">Marks</a>
                    <a th:href="@{/student/profile}" class="nav-link bg-primary text-white">Profile</a>
                    <a th:href="@{/logout}" class="nav-link text-white">Logout</a>
                </nav>
            </div>
            
            <div class="col-md-9 col-lg-10 p-4">
                <h2><i class="fas fa-user-circle"></i> My Profile</h2>
                <hr>
                <div class="card">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <p><strong>Student ID:</strong> <span th:text="${student.studentId}"></span></p>
                                <p><strong>Name:</strong> <span th:text="${student.name}"></span></p>
                                <p><strong>Email:</strong> <span th:text="${student.email}"></span></p>
                                <p><strong>Phone:</strong> <span th:text="${student.phone}"></span></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>Department:</strong> <span th:text="${student.department}"></span></p>
                                <p><strong>Semester:</strong> <span th:text="${student.semester}"></span></p>
                                <p><strong>Batch:</strong> <span th:text="${student.batch}"></span></p>
                                <p><strong>Section:</strong> <span th:text="${student.section}"></span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
